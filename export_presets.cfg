; Presets d'export pour la CI multi-plateforme (Godot 4.7). Écrits à la main.
; Les binaires desktop embarquent le PCK (fichier unique autonome).
; macOS est exporté NON signé (universal) — voir .github/workflows/build.yml.

[preset.0]

name="Linux"
platform="Linux"
runnable=true
dedicated_server=false
custom_features=""
export_filter="all_resources"
include_filter=""
exclude_filter="addons/gdUnit4/*,tests/*,reports/*"
export_path="build/linux/3d-assets-viewer.x86_64"
encryption_include_filters=""
encryption_exclude_filters=""
seed=0
encrypt_pck=false
encrypt_directory=false

[preset.0.options]

binary_format/embed_pck=true
binary_format/architecture="x86_64"
texture_format/s3tc_bptc=true
texture_format/etc2_astc=false

[preset.1]

name="Windows Desktop"
platform="Windows Desktop"
runnable=true
dedicated_server=false
custom_features=""
export_filter="all_resources"
include_filter=""
exclude_filter="addons/gdUnit4/*,tests/*,reports/*"
export_path="build/windows/3d-assets-viewer.exe"
encryption_include_filters=""
encryption_exclude_filters=""
seed=0
encrypt_pck=false
encrypt_directory=false

[preset.1.options]

binary_format/embed_pck=true
binary_format/architecture="x86_64"
texture_format/s3tc_bptc=true
texture_format/etc2_astc=false
codesign/enable=false
application/modify_resources=false

[preset.2]

name="macOS"
platform="macOS"
runnable=true
dedicated_server=false
custom_features=""
export_filter="all_resources"
include_filter=""
exclude_filter="addons/gdUnit4/*,tests/*,reports/*"
export_path="build/macos/3d-assets-viewer.zip"
encryption_include_filters=""
encryption_exclude_filters=""
seed=0
encrypt_pck=false
encrypt_directory=false

[preset.2.options]

; macOS utilise le template universel `macos.zip` (pas de template par arch), qui nécessite ETC2 ASTC.
; Le cross-export depuis Linux headless est instable : la CI construit macOS sur un runner macos-latest natif.
; Bundle identifier OBLIGATOIRE pour l'export macOS (format reverse-DNS) — sinon "Identifier is missing".
application/bundle_identifier="com.guillaumedelre.assetsviewer3d"
export/distribution_type=1
binary_format/architecture="universal"
texture_format/s3tc_bptc=true
texture_format/etc2_astc=true
